<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Récupérer l’url de la page courante</title>
    <script>
      function url() {
        alert("L'URL de cette page est: " + window.location.href);
      }
    </script>
    
  </head>
  <body> 
    <button type="button" onclick="url();">Récupérer l'url</button>
  </body>
</html>
